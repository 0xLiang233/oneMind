name: Release OneMind

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-windows:
    name: Build Windows x64
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.10.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "desktop/tauri/src-tauri -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -ne "v$version") {
            throw "Tag ${{ github.ref_name }} does not match package version v$version."
          }
          Write-Output "Building OneMind v$version"

      - name: Lint renderer
        run: pnpm --dir renderer lint

      - name: Build signed draft release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop/tauri
          tagName: v__VERSION__
          releaseName: OneMind v__VERSION__
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
